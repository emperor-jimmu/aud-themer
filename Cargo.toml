[package]
name = "show-theme-cli"
version = "0.1.0"
edition = "2024"
authors = ["Show Theme CLI Contributors"]
description = "Automate theme song downloads for TV shows and anime"
license = "MIT"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
tokio = { version = "1.40", features = ["full"] }
chromiumoxide = { version = "0.7", features = ["tokio-runtime"] }
indicatif = "0.17"
colored = "2.1"
console = "0.15"
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
strsim = "0.11"
async-trait = "0.1"
rand = "0.8"
scopeguard = "1.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"

[dev-dependencies]
proptest = "1.5"
tempfile = "3.8"

[lib]
name = "show_theme_cli"
path = "src/lib.rs"

[[bin]]
name = "show-theme-cli"
path = "src/main.rs"
