name: Build and Publish Release

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      VERSION: ${{ steps.get_version.outputs.VERSION }}
      EXISTS: ${{ steps.check_release.outputs.EXISTS }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract Cargo.toml Version
        id: get_version
        run: |
          VERSION=$(grep -m1 '^version = ' Cargo.toml | cut -d '"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Check Existing Release
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.get_version.outputs.VERSION }}" > /dev/null 2>&1; then
            echo "EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "EXISTS=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.EXISTS == 'false'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: audio-theme-downloader
            asset_name: audio-theme-downloader-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: audio-theme-downloader.exe
            asset_name: audio-theme-downloader-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: audio-theme-downloader
            asset_name: audio-theme-downloader-macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Compile Executable
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

  publish:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts
        run: |
          mkdir release-assets
          mv artifacts/audio-theme-downloader-linux-x86_64/audio-theme-downloader release-assets/audio-theme-downloader-linux-x86_64
          mv artifacts/audio-theme-downloader-windows-x86_64.exe/audio-theme-downloader.exe release-assets/audio-theme-downloader-windows-x86_64.exe
          mv artifacts/audio-theme-downloader-macos-aarch64/audio-theme-downloader release-assets/audio-theme-downloader-macos-aarch64

      - name: Publish Release and Upload Binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.VERSION }}
        run: |
          gh release create "v$VERSION" \
            release-assets/audio-theme-downloader-linux-x86_64 \
            release-assets/audio-theme-downloader-windows-x86_64.exe \
            release-assets/audio-theme-downloader-macos-aarch64 \
            --title "v$VERSION" \
            --generate-notes
